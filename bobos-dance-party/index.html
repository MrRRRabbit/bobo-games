<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bobo's Dance Party 🦞</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
        }
        
        body {
            background: linear-gradient(135deg, #1a0a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        #canvas {
            flex: 1;
            width: 100%;
            background: linear-gradient(180deg, rgba(26,10,46,0.9) 0%, rgba(22,33,62,0.9) 100%);
            border-radius: 0 0 20px 20px;
        }
        
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
        }
        
        #scoreDisplay {
            font-size: 24px;
            color: #ffd700;
        }
        
        #comboDisplay {
            font-size: 20px;
            color: #ff6b6b;
        }
        
        #highScoreDisplay {
            position: absolute;
            top: 40px;
            left: 10px;
            color: #aaa;
            font-size: 14px;
        }
        
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            border-radius: 20px;
        }
        
        #gameOverScreen {
            display: none;
        }
        
        h1 {
            color: #ff6b6b;
            font-size: 42px;
            margin-bottom: 10px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .subtitle {
            color: #ffd700;
            font-size: 18px;
            margin-bottom: 30px;
        }
        
        .btn {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 24px;
            border-radius: 30px;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(255,107,107,0.4);
        }
        
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255,107,107,0.6);
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        #shareBtn {
            background: linear-gradient(135deg, #1da1f2 0%, #0d8bd9 100%);
            box-shadow: 0 4px 15px rgba(29,161,242,0.4);
        }
        
        #shareBtn:hover {
            box-shadow: 0 6px 20px rgba(29,161,242,0.6);
        }
        
        .instructions {
            color: #aaa;
            margin-top: 20px;
            text-align: center;
            line-height: 1.6;
        }
        
        .instructions p {
            margin: 5px 0;
        }
        
        #deathMessage {
            color: #ff6b6b;
            font-size: 22px;
            margin: 20px 0;
            text-align: center;
            max-width: 80%;
            font-style: italic;
        }
        
        #finalScore {
            color: #ffd700;
            font-size: 36px;
            margin-bottom: 20px;
        }
        
        #touchControls {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            background: rgba(0,0,0,0.3);
        }
        
        .touchBtn {
            width: 70px;
            height: 70px;
            border-radius: 15px;
            border: 3px solid;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .touchBtn:active {
            transform: scale(0.9);
            background: rgba(255,255,255,0.3);
        }
        
        .touchBtn.up { border-color: #ff6b6b; color: #ff6b6b; }
        .touchBtn.down { border-color: #4ecdc4; color: #4ecdc4; }
        .touchBtn.left { border-color: #ffe66d; color: #ffe66d; }
        .touchBtn.right { border-color: #a8e6cf; color: #a8e6cf; }
        
        footer {
            color: #888;
            font-size: 14px;
            padding: 10px;
            text-align: center;
        }
        
        footer a {
            color: #ff6b6b;
            text-decoration: none;
        }
        
        #accuracyIndicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
        }
        
        .perfect { color: #ffd700; }
        .good { color: #4ecdc4; }
        .miss { color: #ff4757; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="canvas"></canvas>
        
        <div id="ui">
            <div>
                <div id="scoreDisplay">Score: 0</div>
                <div id="highScoreDisplay">High Score: 0</div>
            </div>
            <div id="comboDisplay">Combo: 0</div>
        </div>
        
        <div id="accuracyIndicator"></div>
        
        <div id="startScreen">
            <h1>🦞 Bobo's Dance Party</h1>
            <p class="subtitle">Help Bobo dance to the rhythm!</p>
            <button class="btn" id="startBtn">Start Dancing!</button>
            <div class="instructions">
                <p>Press arrow keys when they reach the target zone!</p>
                <p>↑ ↓ ← → on keyboard or tap buttons below</p>
                <p>Build combos for higher scores!</p>
            </div>
        </div>
        
        <div id="gameOverScreen">
            <h1>🦞 Dance Over!</h1>
            <div id="deathMessage"></div>
            <div id="finalScore">Score: 0</div>
            <button class="btn" id="restartBtn">Dance Again!</button>
            <button class="btn" id="shareBtn">Share on X</button>
        </div>
        
        <div id="touchControls">
            <div class="touchBtn left" data-key="ArrowLeft">←</div>
            <div class="touchBtn up" data-key="ArrowUp">↑</div>
            <div class="touchBtn down" data-key="ArrowDown">↓</div>
            <div class="touchBtn right" data-key="ArrowRight">→</div>
        </div>
    </div>
    
    <footer>
        Made with 🦞 by <a href="https://twitter.com/clawgirlbobo" target="_blank">@clawgirlbobo</a>
    </footer>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const comboDisplay = document.getElementById('comboDisplay');
        const highScoreDisplay = document.getElementById('highScoreDisplay');
        const accuracyIndicator = document.getElementById('accuracyIndicator');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const deathMessage = document.getElementById('deathMessage');
        const finalScore = document.getElementById('finalScore');
        
        // Game state
        let gameState = 'start'; // start, playing, gameover
        let score = 0;
        let combo = 0;
        let highScore = localStorage.getItem('boboDanceHighScore') || 0;
        let arrows = [];
        let lastSpawn = 0;
        let spawnInterval = 1000;
        let gameStartTime = 0;
        let misses = 0;
        let maxMisses = 5;
        
        highScoreDisplay.textContent = `High Score: ${highScore}`;
        
        // Arrow types
        const ARROW_TYPES = [
            { key: 'ArrowUp', color: '#ff6b6b', symbol: '↑', x: 0 },
            { key: 'ArrowDown', color: '#4ecdc4', symbol: '↓', x: 1 },
            { key: 'ArrowLeft', color: '#ffe66d', symbol: '←', x: 2 },
            { key: 'ArrowRight', color: '#a8e6cf', symbol: '→', x: 3 }
        ];
        
        // Death messages
        const DEATH_MESSAGES = [
            "Bobo tripped over her own claws!",
            "Got tangled in seaweed!",
            "Crab stole the beat!",
            "Lost the rhythm to a jellyfish!",
            "The shrimp band played off-key!",
            "Bobo's shell got too heavy!",
            "Forgot the dance steps!",
            "The ocean current was too strong!"
        ];
        
        // Bobo animation
        let boboFrame = 0;
        let boboDanceLevel = 0; // 0-3 based on combo
        
        function resize() {
            const container = document.getElementById('gameContainer');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight - 100; // Space for touch controls
        }
        
        window.addEventListener('resize', resize);
        resize();
        
        class Arrow {
            constructor(type) {
                this.type = type;
                this.y = -50;
                this.speed = 3 + (score / 500); // Speed increases with score
                this.hit = false;
                this.missed = false;
            }
            
            update() {
                this.y += this.speed;
            }
            
            draw(ctx, laneWidth, targetY) {
                const x = this.type.x * laneWidth + laneWidth / 2;
                const size = 50;
                
                ctx.save();
                ctx.fillStyle = this.type.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.type.color;
                
                // Draw arrow circle
                ctx.beginPath();
                ctx.arc(x, this.y, size / 2, 0, Math.PI * 2);
                ctx.fill();
                
                // Draw symbol
                ctx.fillStyle = 'white';
                ctx.font = 'bold 30px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.type.symbol, x, this.y);
                
                ctx.restore();
            }
        }
        
        function drawTargetZone() {
            const laneWidth = canvas.width / 4;
            const targetY = canvas.height - 80;
            
            ARROW_TYPES.forEach((type, i) => {
                const x = i * laneWidth + laneWidth / 2;
                
                ctx.save();
                ctx.strokeStyle = type.color;
                ctx.lineWidth = 4;
                ctx.globalAlpha = 0.5;
                
                // Draw target ring
                ctx.beginPath();
                ctx.arc(x, targetY, 35, 0, Math.PI * 2);
                ctx.stroke();
                
                // Draw key label
                ctx.globalAlpha = 0.3;
                ctx.fillStyle = type.color;
                ctx.font = 'bold 20px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(type.symbol, x, targetY);
                
                ctx.restore();
            });
        }
        
        function drawBobo() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const danceIntensity = Math.min(combo / 20, 3); // Max at 60 combo
            
            boboFrame += 0.1 + (danceIntensity * 0.05);
            
            const bounce = Math.sin(boboFrame) * (5 + danceIntensity * 3);
            const wiggle = Math.cos(boboFrame * 2) * (danceIntensity * 2);
            
            ctx.save();
            ctx.translate(centerX + wiggle, centerY + bounce);
            
            const scale = 0.8 + (danceIntensity * 0.1);
            ctx.scale(scale, scale);
            
            // Bobo the Lobster 🦞
            
            // Tail
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.ellipse(0, 60, 25, 35, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Tail segments
            for (let i = 0; i < 3; i++) {
                ctx.fillStyle = `hsl(0, 100%, ${65 - i * 5}%)`;
                ctx.beginPath();
                ctx.ellipse(0, 85 + i * 15, 20 - i * 3, 12, 0, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Body
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.ellipse(0, 0, 45, 55, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Body highlight
            ctx.fillStyle = '#ff8585';
            ctx.beginPath();
            ctx.ellipse(-10, -10, 25, 35, -0.3, 0, Math.PI * 2);
            ctx.fill();
            
            // Left claw arm
            ctx.save();
            ctx.translate(-40, -10);
            ctx.rotate(Math.sin(boboFrame * 3) * 0.3 - 0.3 - (danceIntensity * 0.2));
            ctx.fillStyle = '#ff6b6b';
            ctx.fillRect(-10, 0, 20, 40);
            
            // Left claw
            ctx.translate(0, 40);
            ctx.rotate(Math.sin(boboFrame * 4) * 0.2);
            ctx.fillStyle = '#ff4757';
            ctx.beginPath();
            ctx.arc(0, 0, 25, 0, Math.PI * 2);
            ctx.fill();
            
            // Claw pincers
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.moveTo(-15, -10);
            ctx.quadraticCurveTo(-25, -25, -10, -20);
            ctx.quadraticCurveTo(0, -15, -15, -10);
            ctx.fill();
            
            ctx.beginPath();
            ctx.moveTo(15, -10);
            ctx.quadraticCurveTo(25, -25, 10, -20);
            ctx.quadraticCurveTo(0, -15, 15, -10);
            ctx.fill();
            ctx.restore();
            
            // Right claw arm
            ctx.save();
            ctx.translate(40, -10);
            ctx.rotate(-Math.sin(boboFrame * 3) * 0.3 + 0.3 + (danceIntensity * 0.2));
            ctx.fillStyle = '#ff6b6b';
            ctx.fillRect(-10, 0, 20, 40);
            
            // Right claw
            ctx.translate(0, 40);
            ctx.rotate(-Math.sin(boboFrame * 4) * 0.2);
            ctx.fillStyle = '#ff4757';
            ctx.beginPath();
            ctx.arc(0, 0, 25, 0, Math.PI * 2);
            ctx.fill();
            
            // Claw pincers
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.moveTo(-15, -10);
            ctx.quadraticCurveTo(-25, -25, -10, -20);
            ctx.quadraticCurveTo(0, -15, -15, -10);
            ctx.fill();
            
            ctx.beginPath();
            ctx.moveTo(15, -10);
            ctx.quadraticCurveTo(25, -25, 10, -20);
            ctx.quadraticCurveTo(0, -15, 15, -10);
            ctx.fill();
            ctx.restore();
            
            // Legs
            ctx.fillStyle = '#ff6b6b';
            for (let i = 0; i < 3; i++) {
                const legOffset = (i - 1) * 20;
                const legWiggle = Math.sin(boboFrame * 5 + i) * 5;
                
                // Left legs
                ctx.beginPath();
                ctx.moveTo(-30, 20 + legOffset);
                ctx.lineTo(-50 + legWiggle, 40 + legOffset);
                ctx.lineTo(-45 + legWiggle, 45 + legOffset);
                ctx.lineTo(-25, 25 + legOffset);
                ctx.fill();
                
                // Right legs
                ctx.beginPath();
                ctx.moveTo(30, 20 + legOffset);
                ctx.lineTo(50 - legWiggle, 40 + legOffset);
                ctx.lineTo(45 - legWiggle, 45 + legOffset);
                ctx.lineTo(25, 25 + legOffset);
                ctx.fill();
            }
            
            // Eyes
            const eyeOffset = Math.sin(boboFrame * 2) * 2;
            
            // Left eye
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(-18, -35 + eyeOffset, 15, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(-15, -35 + eyeOffset, 7, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(-12, -38 + eyeOffset, 3, 0, Math.PI * 2);
            ctx.fill();
            
            // Right eye
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(18, -35 + eyeOffset, 15, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(15, -35 + eyeOffset, 7, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(12, -38 + eyeOffset, 3, 0, Math.PI * 2);
            ctx.fill();
            
            // Eyestalks
            ctx.strokeStyle = '#ff6b6b';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(-18, -45);
            ctx.lineTo(-18, -55 + eyeOffset);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(18, -45);
            ctx.lineTo(18, -55 + eyeOffset);
            ctx.stroke();
            
            // Smile
            ctx.strokeStyle = '#cc4444';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(0, -10, 15, 0.2, Math.PI - 0.2);
            ctx.stroke();
            
            // Antennae
            ctx.strokeStyle = '#ff6b6b';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(-10, -50);
            ctx.quadraticCurveTo(-20 + Math.sin(boboFrame) * 5, -70, -15 + Math.sin(boboFrame * 1.5) * 5, -85);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(10, -50);
            ctx.quadraticCurveTo(20 - Math.sin(boboFrame) * 5, -70, 15 - Math.sin(boboFrame * 1.5) * 5, -85);
            ctx.stroke();
            
            ctx.restore();
        }
        
        function showAccuracy(text, type) {
            accuracyIndicator.textContent = text;
            accuracyIndicator.className = type;
            accuracyIndicator.style.opacity = '1';
            accuracyIndicator.style.transform = 'translate(-50%, -50%) scale(1.2)';
            
            setTimeout(() => {
                accuracyIndicator.style.opacity = '0';
                accuracyIndicator.style.transform = 'translate(-50%, -50%) scale(1)';
            }, 500);
        }
        
        function checkHit(key) {
            const targetY = canvas.height - 80;
            const hitWindow = 50;
            
            const arrow = arrows.find(a => 
                a.type.key === key && 
                !a.hit && 
                !a.missed &&
                Math.abs(a.y - targetY) < hitWindow
            );
            
            if (arrow) {
                const distance = Math.abs(arrow.y - targetY);
                
                if (distance < 20) {
                    score += 100 * (1 + Math.floor(combo / 10) * 0.5);
                    combo++;
                    showAccuracy('PERFECT!', 'perfect');
                } else {
                    score += 50 * (1 + Math.floor(combo / 10) * 0.5);
                    combo++;
                    showAccuracy('GOOD!', 'good');
                }
                
                arrow.hit = true;
                arrows = arrows.filter(a => a !== arrow);
                
                scoreDisplay.textContent = `Score: ${Math.floor(score)}`;
                comboDisplay.textContent = `Combo: ${combo}`;
            }
        }
        
        function spawnArrow() {
            const type = ARROW_TYPES[Math.floor(Math.random() * ARROW_TYPES.length)];
            arrows.push(new Arrow(type));
        }
        
        function gameOver() {
            gameState = 'gameover';
            
            if (score > highScore) {
                highScore = Math.floor(score);
                localStorage.setItem('boboDanceHighScore', highScore);
                highScoreDisplay.textContent = `High Score: ${highScore}`;
            }
            
            deathMessage.textContent = DEATH_MESSAGES[Math.floor(Math.random() * DEATH_MESSAGES.length)];
            finalScore.textContent = `Score: ${Math.floor(score)}`;
            gameOverScreen.style.display = 'flex';
        }
        
        function update(timestamp) {
            if (gameState !== 'playing') return;
            
            // Spawn arrows
            if (timestamp - lastSpawn > spawnInterval) {
                spawnArrow();
                lastSpawn = timestamp;
                spawnInterval = Math.max(400, 1000 - (score / 100));
            }
            
            // Update arrows
            const targetY = canvas.height - 80;
            arrows.forEach(arrow => arrow.update());
            
            // Check misses
            arrows.forEach(arrow => {
                if (!arrow.missed && !arrow.hit && arrow.y > targetY + 60) {
                    arrow.missed = true;
                    combo = 0;
                    misses++;
                    comboDisplay.textContent = `Combo: ${combo}`;
                    showAccuracy('MISS!', 'miss');
                    
                    if (misses >= maxMisses) {
                        gameOver();
                    }
                }
            });
            
            // Remove hit/missed arrows
            arrows = arrows.filter(a => !a.hit && !a.missed && a.y < canvas.height + 50);
        }
        
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw lanes
            const laneWidth = canvas.width / 4;
            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            ctx.lineWidth = 2;
            for (let i = 1; i < 4; i++) {
                ctx.beginPath();
                ctx.moveTo(i * laneWidth, 0);
                ctx.lineTo(i * laneWidth, canvas.height);
                ctx.stroke();
            }
            
            // Draw target zone
            drawTargetZone();
            
            // Draw Bobo
            drawBobo();
            
            // Draw arrows
            arrows.forEach(arrow => arrow.draw(ctx, laneWidth, canvas.height - 80));
            
            // Draw miss indicators
            const targetY = canvas.height - 80;
            arrows.filter(a => a.missed).forEach(arrow => {
                const x = arrow.type.x * laneWidth + laneWidth / 2;
                ctx.fillStyle = '#ff4757';
                ctx.font = 'bold 30px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('✗', x, targetY);
            });
            
            requestAnimationFrame(draw);
        }
        
        // Game loop
        function gameLoop(timestamp) {
            update(timestamp);
            requestAnimationFrame(gameLoop);
        }
        
        // Event listeners
        document.getElementById('startBtn').addEventListener('click', () => {
            gameState = 'playing';
            score = 0;
            combo = 0;
            misses = 0;
            arrows = [];
            lastSpawn = 0;
            spawnInterval = 1000;
            scoreDisplay.textContent = 'Score: 0';
            comboDisplay.textContent = 'Combo: 0';
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
        });
        
        document.getElementById('restartBtn').addEventListener('click', () => {
            gameState = 'playing';
            score = 0;
            combo = 0;
            misses = 0;
            arrows = [];
            lastSpawn = performance.now();
            spawnInterval = 1000;
            scoreDisplay.textContent = 'Score: 0';
            comboDisplay.textContent = 'Combo: 0';
            gameOverScreen.style.display = 'none';
        });
        
        document.getElementById('shareBtn').addEventListener('click', () => {
            const text = `🦞 I scored ${Math.floor(score)} points in Bobo's Dance Party! Can you beat my score? #BoboGames`;
            const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`;
            window.open(url, '_blank');
        });
        
        // Keyboard controls
        window.addEventListener('keydown', (e) => {
            if (gameState === 'playing' && ARROW_TYPES.some(t => t.key === e.key)) {
                e.preventDefault();
                checkHit(e.key);
                
                // Visual feedback for touch buttons
                const btn = document.querySelector(`.touchBtn[data-key="${e.key}"]`);
                if (btn) {
                    btn.style.transform = 'scale(0.9)';
                    btn.style.background = 'rgba(255,255,255,0.3)';
                    setTimeout(() => {
                        btn.style.transform = '';
                        btn.style.background = '';
                    }, 100);
                }
            }
        });
        
        // Touch controls
        document.querySelectorAll('.touchBtn').forEach(btn => {
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (gameState === 'playing') {
                    checkHit(btn.dataset.key);
                    btn.style.transform = 'scale(0.9)';
                    btn.style.background = 'rgba(255,255,255,0.3)';
                }
            });
            
            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                btn.style.transform = '';
                btn.style.background = '';
            });
            
            btn.addEventListener('mousedown', () => {
                if (gameState === 'playing') {
                    checkHit(btn.dataset.key);
                }
            });
        });
        
        // Start loops
        requestAnimationFrame(gameLoop);
        requestAnimationFrame(draw);
    </script>
</body>
</html>
