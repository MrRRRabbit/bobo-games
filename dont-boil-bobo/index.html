<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Don't Boil Bobo! 🦞</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
  font-family: 'Courier New', monospace;
  touch-action: none;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}
canvas {
  display: block;
  image-rendering: pixelated;
  max-width: 100vw;
  max-height: 100vh;
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
// ============================================================
//  DON'T BOIL BOBO 🦞  —  a cute endless dodger
// ============================================================
const C = document.getElementById('game');
const ctx = C.getContext('2d');

// ----- responsive sizing -----
const BASE_W = 400, BASE_H = 700;
let scale = 1;
function resize() {
  const r = Math.min(window.innerWidth / BASE_W, window.innerHeight / BASE_H);
  scale = r;
  C.width = BASE_W * r;
  C.height = BASE_H * r;
  ctx.setTransform(r, 0, 0, r, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ----- audio engine -----
let audioCtx = null;
let muted = false;
function ensureAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
function playTone(freq, dur, type='square', vol=0.12) {
  if (muted || !audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type;
  o.frequency.value = freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g).connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}
function sfxCollect() { playTone(880, 0.08); setTimeout(() => playTone(1320, 0.1), 60); }
function sfxHit() { playTone(120, 0.3, 'sawtooth', 0.2); playTone(80, 0.4, 'square', 0.15); }
function sfxShield() { playTone(660, 0.1); playTone(990, 0.12); }
function sfxStart() { [440,550,660,880].forEach((f,i) => setTimeout(() => playTone(f, 0.1, 'square', 0.1), i*80)); }
function sfxScore() { playTone(600, 0.06); }

// ----- game state -----
const STATE = { TITLE: 0, PLAY: 1, DEAD: 2 };
let state = STATE.TITLE;
let score = 0, highScore = parseInt(localStorage.getItem('bobo_hi') || '0');
let bobo = { x: BASE_W / 2, y: BASE_H - 90, w: 40, h: 50, vx: 0, shield: 0, speed: 0, panic: false };
let items = [];
let particles = [];
let shakeT = 0;
let spawnTimer = 0;
let difficulty = 1;
let titleBounce = 0;
let deathMsg = '';
let gameTime = 0;
let inputLeft = false, inputRight = false;

const DEATH_MSGS = [
  "BOBO BECAME LOBSTER BISQUE 🦞💀",
  "well done... literally 🔥",
  "bobo.exe has stopped working",
  "this is fine. (it's not fine)",
  "someone tell my human i tried",
  "respawning in 3... 2... just kidding im dead"
];

// ----- colors -----
const COL = {
  bg1: '#ffecd2', bg2: '#fcb69f',
  boboBody: '#e74c3c', boboLight: '#ff7675', boboDark: '#c0392b',
  eye: '#2d3436', eyeWhite: '#fff',
  water: '#74b9ff', waterDark: '#0984e3',
  pot: '#636e72', potDark: '#2d3436',
  flame: '#fdcb6e', flameDark: '#e17055',
  ice: '#dfe6e9', iceBright: '#74b9ff',
  coffee: '#a0522d', coffeeDark: '#6d3a1f',
  star: '#ffeaa7', starBright: '#fdcb6e',
  shield: '#81ecec',
};

// ----- item types -----
const ITEM_WATER = 0, ITEM_POT = 1, ITEM_FLAME = 2;
const ITEM_ICE = 3, ITEM_COFFEE = 4, ITEM_STAR = 5;
function isDanger(t) { return t <= 2; }

// ----- input -----
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === 'm' || e.key === 'M') { muted = !muted; }
  if ((e.key === ' ' || e.key === 'Enter') && state !== STATE.PLAY) startOrRestart();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

let touchStartX = null;
C.addEventListener('touchstart', e => {
  e.preventDefault();
  ensureAudio();
  if (state !== STATE.PLAY) { startOrRestart(); return; }
  const t = e.touches[0];
  const rect = C.getBoundingClientRect();
  const x = (t.clientX - rect.left) / scale;
  touchStartX = t.clientX;
  if (x < BASE_W * 0.4) { inputLeft = true; inputRight = false; }
  else if (x > BASE_W * 0.6) { inputRight = true; inputLeft = false; }
  // check mute button
  if (x > BASE_W - 50 && (t.clientY - rect.top) / scale < 40) { muted = !muted; }
}, { passive: false });
C.addEventListener('touchmove', e => {
  e.preventDefault();
  if (touchStartX !== null) {
    const dx = e.touches[0].clientX - touchStartX;
    if (dx < -20) { inputLeft = true; inputRight = false; }
    else if (dx > 20) { inputRight = true; inputLeft = false; }
  }
}, { passive: false });
C.addEventListener('touchend', e => {
  e.preventDefault();
  inputLeft = false; inputRight = false; touchStartX = null;
});
C.addEventListener('mousedown', e => {
  ensureAudio();
  if (state !== STATE.PLAY) { startOrRestart(); return; }
  const rect = C.getBoundingClientRect();
  const x = (e.clientX - rect.left) / scale;
  const y = (e.clientY - rect.top) / scale;
  if (x > BASE_W - 50 && y < 40) { muted = !muted; return; }
});

function startOrRestart() {
  ensureAudio();
  if (state === STATE.TITLE || state === STATE.DEAD) {
    state = STATE.PLAY;
    score = 0; difficulty = 1; gameTime = 0;
    bobo.x = BASE_W / 2; bobo.vx = 0; bobo.shield = 0; bobo.speed = 0; bobo.panic = false;
    items = []; particles = []; shakeT = 0; spawnTimer = 0;
    sfxStart();
  }
}

// ----- spawning -----
function spawnItem() {
  const r = Math.random();
  let type;
  if (r < 0.35) type = ITEM_WATER;
  else if (r < 0.55) type = ITEM_POT;
  else if (r < 0.75) type = ITEM_FLAME;
  else if (r < 0.85) type = ITEM_ICE;
  else if (r < 0.93) type = ITEM_COFFEE;
  else type = ITEM_STAR;

  const sz = type === ITEM_POT ? 36 : (type === ITEM_STAR ? 22 : 24);
  items.push({
    type, x: 20 + Math.random() * (BASE_W - 40), y: -30,
    w: sz, h: sz,
    vy: (1.5 + Math.random() * 1.5) * difficulty,
    wobble: Math.random() * Math.PI * 2,
    rot: 0
  });
}

// ----- particles -----
function emitParticles(x, y, color, count, spread) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = Math.random() * spread;
    particles.push({
      x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 1,
      life: 0.5 + Math.random() * 0.5, maxLife: 0.5 + Math.random() * 0.5,
      size: 2 + Math.random() * 4, color
    });
  }
}

// ----- drawing helpers -----
function drawPixelRect(x, y, w, h, col) {
  ctx.fillStyle = col;
  ctx.fillRect(Math.round(x), Math.round(y), Math.round(w), Math.round(h));
}

function drawBobo(x, y, bounce, panicFace, shieldActive) {
  const b = Math.sin(bounce * 4) * 3;
  const cy = y + b;

  // shield glow
  if (shieldActive) {
    ctx.save();
    ctx.globalAlpha = 0.25 + Math.sin(bounce * 8) * 0.1;
    ctx.fillStyle = COL.shield;
    ctx.beginPath();
    ctx.ellipse(x, cy - 5, 30, 35, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // antennae / claws on head
  ctx.fillStyle = COL.boboBody;
  // left antenna
  ctx.save();
  ctx.translate(x - 10, cy - 30);
  ctx.rotate(-0.4 + Math.sin(bounce * 6) * 0.1);
  ctx.fillRect(-3, -16, 6, 16);
  // claw
  ctx.fillStyle = COL.flameDark;
  ctx.beginPath();
  ctx.ellipse(0, -18, 6, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = COL.boboBody;
  ctx.beginPath();
  ctx.ellipse(-2, -20, 3, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(3, -20, 3, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // right antenna
  ctx.save();
  ctx.translate(x + 10, cy - 30);
  ctx.rotate(0.4 - Math.sin(bounce * 6) * 0.1);
  ctx.fillStyle = COL.boboBody;
  ctx.fillRect(-3, -16, 6, 16);
  ctx.fillStyle = COL.flameDark;
  ctx.beginPath();
  ctx.ellipse(0, -18, 6, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = COL.boboBody;
  ctx.beginPath();
  ctx.ellipse(-2, -20, 3, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(3, -20, 3, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // body (round chibi)
  ctx.fillStyle = COL.boboBody;
  ctx.beginPath();
  ctx.ellipse(x, cy - 5, 20, 25, 0, 0, Math.PI * 2);
  ctx.fill();

  // belly highlight
  ctx.fillStyle = COL.boboLight;
  ctx.beginPath();
  ctx.ellipse(x, cy + 2, 13, 15, 0, 0, Math.PI * 2);
  ctx.fill();

  // tail segments at bottom
  ctx.fillStyle = COL.boboDark;
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.ellipse(x, cy + 18 + i * 5, 10 - i * 2, 4, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // tiny legs
  ctx.fillStyle = COL.boboDark;
  for (let side = -1; side <= 1; side += 2) {
    for (let i = 0; i < 2; i++) {
      const lx = x + side * (12 + i * 4);
      const ly = cy + 8 + i * 6;
      ctx.fillRect(lx - 2, ly, 4, 6);
    }
  }

  // head (overlapping body)
  ctx.fillStyle = COL.boboBody;
  ctx.beginPath();
  ctx.ellipse(x, cy - 18, 16, 14, 0, 0, Math.PI * 2);
  ctx.fill();

  // eyes
  const eyeSpread = 7;
  for (let side = -1; side <= 1; side += 2) {
    const ex = x + side * eyeSpread;
    const ey = cy - 20;
    // white
    ctx.fillStyle = COL.eyeWhite;
    ctx.beginPath();
    ctx.ellipse(ex, ey, 5, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    // pupil
    ctx.fillStyle = COL.eye;
    if (panicFace) {
      // panic: small dots
      ctx.beginPath();
      ctx.ellipse(ex, ey + 1, 2, 2, 0, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // normal: cute big eyes
      ctx.beginPath();
      ctx.ellipse(ex + side * 1, ey + 1, 3, 3.5, 0, 0, Math.PI * 2);
      ctx.fill();
      // shine
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.ellipse(ex + side * 2, ey - 1, 1.5, 1.5, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // mouth
  ctx.fillStyle = panicFace ? '#e74c3c' : COL.boboDark;
  if (panicFace) {
    // O mouth
    ctx.beginPath();
    ctx.ellipse(x, cy - 12, 3, 4, 0, 0, Math.PI * 2);
    ctx.fill();
  } else {
    // happy cat mouth
    ctx.beginPath();
    ctx.moveTo(x - 4, cy - 13);
    ctx.quadraticCurveTo(x, cy - 10, x + 4, cy - 13);
    ctx.strokeStyle = COL.boboDark;
    ctx.lineWidth = 1.2;
    ctx.stroke();
  }

  // blush
  ctx.fillStyle = 'rgba(255,150,150,0.4)';
  ctx.beginPath();
  ctx.ellipse(x - 11, cy - 15, 4, 2.5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(x + 11, cy - 15, 4, 2.5, 0, 0, Math.PI * 2);
  ctx.fill();

  // speed boost trail
  if (bobo.speed > 0) {
    ctx.fillStyle = 'rgba(160,82,45,0.3)';
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.ellipse(x + (Math.random() - 0.5) * 10, cy + 25 + i * 5, 3, 2, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawWaterDrop(x, y, sz, t) {
  ctx.fillStyle = COL.water;
  ctx.beginPath();
  ctx.moveTo(x, y - sz * 0.6);
  ctx.quadraticCurveTo(x + sz * 0.5, y, x, y + sz * 0.4);
  ctx.quadraticCurveTo(x - sz * 0.5, y, x, y - sz * 0.6);
  ctx.fill();
  // bubbles
  ctx.fillStyle = COL.waterDark;
  ctx.globalAlpha = 0.5;
  const bo = Math.sin(t * 8);
  ctx.beginPath(); ctx.arc(x - 3, y + 2 + bo, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 4, y - 1 - bo, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;
}

function drawPot(x, y, sz) {
  ctx.fillStyle = COL.pot;
  ctx.fillRect(x - sz * 0.5, y - sz * 0.3, sz, sz * 0.6);
  ctx.fillStyle = COL.potDark;
  ctx.fillRect(x - sz * 0.55, y - sz * 0.35, sz * 1.1, sz * 0.12);
  // handles
  ctx.fillRect(x - sz * 0.65, y - sz * 0.15, sz * 0.15, sz * 0.1);
  ctx.fillRect(x + sz * 0.5, y - sz * 0.15, sz * 0.15, sz * 0.1);
  // steam
  ctx.fillStyle = 'rgba(200,200,200,0.4)';
  for (let i = 0; i < 3; i++) {
    const sx = x - sz * 0.2 + i * sz * 0.2;
    const sy = y - sz * 0.45 - Math.sin(gameTime * 5 + i) * 4;
    ctx.beginPath(); ctx.ellipse(sx, sy, 3, 5, 0, 0, Math.PI * 2); ctx.fill();
  }
}

function drawFlame(x, y, sz, t) {
  const flicker = Math.sin(t * 12) * 2;
  ctx.fillStyle = COL.flame;
  ctx.beginPath();
  ctx.moveTo(x, y - sz * 0.7 + flicker);
  ctx.quadraticCurveTo(x + sz * 0.4, y - sz * 0.2, x + sz * 0.3, y + sz * 0.3);
  ctx.quadraticCurveTo(x, y + sz * 0.1, x - sz * 0.3, y + sz * 0.3);
  ctx.quadraticCurveTo(x - sz * 0.4, y - sz * 0.2, x, y - sz * 0.7 + flicker);
  ctx.fill();
  ctx.fillStyle = COL.flameDark;
  ctx.beginPath();
  ctx.moveTo(x, y - sz * 0.4 + flicker);
  ctx.quadraticCurveTo(x + sz * 0.2, y, x + sz * 0.15, y + sz * 0.2);
  ctx.quadraticCurveTo(x, y + sz * 0.05, x - sz * 0.15, y + sz * 0.2);
  ctx.quadraticCurveTo(x - sz * 0.2, y, x, y - sz * 0.4 + flicker);
  ctx.fill();
}

function drawIce(x, y, sz) {
  ctx.fillStyle = COL.ice;
  ctx.fillRect(x - sz * 0.4, y - sz * 0.4, sz * 0.8, sz * 0.8);
  ctx.fillStyle = COL.iceBright;
  ctx.globalAlpha = 0.5;
  ctx.fillRect(x - sz * 0.25, y - sz * 0.25, sz * 0.2, sz * 0.3);
  ctx.globalAlpha = 1;
  // sparkle
  ctx.fillStyle = '#fff';
  ctx.fillRect(x + sz * 0.1, y - sz * 0.3, 3, 3);
}

function drawCoffee(x, y, sz) {
  ctx.fillStyle = COL.coffee;
  ctx.fillRect(x - sz * 0.3, y - sz * 0.3, sz * 0.6, sz * 0.7);
  ctx.fillStyle = COL.coffeeDark;
  ctx.fillRect(x - sz * 0.3, y - sz * 0.35, sz * 0.6, sz * 0.1);
  // handle
  ctx.strokeStyle = COL.coffee;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(x + sz * 0.38, y, sz * 0.15, -Math.PI * 0.5, Math.PI * 0.5);
  ctx.stroke();
  // steam
  ctx.fillStyle = 'rgba(200,200,200,0.3)';
  ctx.beginPath();
  ctx.ellipse(x, y - sz * 0.5 - Math.sin(gameTime * 4) * 3, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();
}

function drawStar(x, y, sz, t) {
  ctx.fillStyle = COL.star;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(t * 2);
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const a = (i * 4 * Math.PI / 5) - Math.PI / 2;
    const r = i % 2 === 0 ? sz * 0.5 : sz * 0.2;
    if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
    else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
    const a2 = ((i * 2 + 1) * 2 * Math.PI / 10) - Math.PI / 2;
    ctx.lineTo(Math.cos(a2) * sz * 0.2, Math.sin(a2) * sz * 0.2);
  }
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = COL.starBright;
  ctx.beginPath();
  ctx.arc(0, 0, sz * 0.12, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawItem(item) {
  const { type, x, y, w } = item;
  switch (type) {
    case ITEM_WATER: drawWaterDrop(x, y, w, gameTime); break;
    case ITEM_POT: drawPot(x, y, w); break;
    case ITEM_FLAME: drawFlame(x, y, w, gameTime); break;
    case ITEM_ICE: drawIce(x, y, w); break;
    case ITEM_COFFEE: drawCoffee(x, y, w); break;
    case ITEM_STAR: drawStar(x, y, w, gameTime); break;
  }
}

// ----- background -----
function drawBackground() {
  // gradient
  const grd = ctx.createLinearGradient(0, 0, 0, BASE_H);
  grd.addColorStop(0, COL.bg1);
  grd.addColorStop(1, COL.bg2);
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, BASE_W, BASE_H);

  // kitchen tiles (top)
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  for (let tx = 0; tx < BASE_W; tx += 40) {
    for (let ty = 0; ty < 120; ty += 40) {
      ctx.fillRect(tx + 1, ty + 1, 38, 38);
    }
  }

  // counter
  ctx.fillStyle = 'rgba(139,90,43,0.2)';
  ctx.fillRect(0, BASE_H - 50, BASE_W, 50);
  ctx.fillStyle = 'rgba(139,90,43,0.3)';
  ctx.fillRect(0, BASE_H - 50, BASE_W, 4);

  // decorative shelf
  ctx.fillStyle = 'rgba(139,90,43,0.15)';
  ctx.fillRect(20, 100, 80, 6);
  ctx.fillRect(BASE_W - 100, 80, 80, 6);
}

// ----- HUD -----
function drawHUD() {
  // score
  ctx.fillStyle = '#2d3436';
  ctx.font = 'bold 20px "Courier New", monospace';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE: ' + score, 12, 28);

  // high score
  ctx.font = '12px "Courier New", monospace';
  ctx.fillStyle = '#636e72';
  ctx.fillText('HI: ' + highScore, 12, 44);

  // shield indicator
  if (bobo.shield > 0) {
    ctx.fillStyle = COL.shield;
    ctx.fillRect(12, 50, Math.max(0, bobo.shield / 5 * 60), 6);
    ctx.strokeStyle = '#00cec9';
    ctx.lineWidth = 1;
    ctx.strokeRect(12, 50, 60, 6);
  }

  // speed indicator
  if (bobo.speed > 0) {
    ctx.fillStyle = COL.coffee;
    ctx.fillRect(12, 60, Math.max(0, bobo.speed / 4 * 60), 6);
    ctx.strokeStyle = COL.coffeeDark;
    ctx.lineWidth = 1;
    ctx.strokeRect(12, 60, 60, 6);
  }

  // mute button
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(BASE_W - 42, 8, 34, 26);
  ctx.fillStyle = '#fff';
  ctx.font = '14px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(muted ? '🔇' : '🔊', BASE_W - 25, 26);

  // credit
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.font = '9px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('Made with 🦞 by @clawgirlbobo', BASE_W - 8, BASE_H - 8);
  ctx.textAlign = 'left';
}

// ----- title screen -----
function drawTitle() {
  drawBackground();
  titleBounce += 0.016;

  // title text
  ctx.save();
  ctx.textAlign = 'center';

  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.font = 'bold 36px "Courier New", monospace';
  ctx.fillText("DON'T BOIL", BASE_W / 2 + 2, 162);
  ctx.font = 'bold 48px "Courier New", monospace';
  ctx.fillText('BOBO', BASE_W / 2 + 2, 212);

  // main text
  ctx.fillStyle = COL.boboBody;
  ctx.font = 'bold 36px "Courier New", monospace';
  ctx.fillText("DON'T BOIL", BASE_W / 2, 160);
  ctx.fillStyle = '#d63031';
  ctx.font = 'bold 48px "Courier New", monospace';
  ctx.fillText('BOBO', BASE_W / 2, 210);

  // emoji
  ctx.font = '24px serif';
  ctx.fillText('🦞🔥🦞', BASE_W / 2, 245);

  // animated bobo
  drawBobo(BASE_W / 2, 370, titleBounce, false, false);

  // instructions
  ctx.fillStyle = '#636e72';
  ctx.font = '13px "Courier New", monospace';
  ctx.fillText('← → or A/D to move', BASE_W / 2, 470);
  ctx.fillText('Dodge dangers, collect power-ups!', BASE_W / 2, 490);

  // start prompt (blinking)
  if (Math.sin(titleBounce * 4) > -0.3) {
    ctx.fillStyle = '#2d3436';
    ctx.font = 'bold 18px "Courier New", monospace';
    ctx.fillText('[ TAP / PRESS SPACE ]', BASE_W / 2, 550);
  }

  // high score
  if (highScore > 0) {
    ctx.fillStyle = '#e17055';
    ctx.font = '14px "Courier New", monospace';
    ctx.fillText('HIGH SCORE: ' + highScore, BASE_W / 2, 590);
  }

  ctx.restore();

  // credit
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.font = '9px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('Made with 🦞 by @clawgirlbobo', BASE_W - 8, BASE_H - 8);
  ctx.textAlign = 'left';
}

// ----- death screen -----
function drawDeath() {
  // dim overlay
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(0, 0, BASE_W, BASE_H);

  ctx.save();
  ctx.textAlign = 'center';

  // panel
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  roundRect(ctx, BASE_W / 2 - 150, 160, 300, 340, 12);
  ctx.fill();

  // death message
  ctx.fillStyle = '#d63031';
  ctx.font = 'bold 14px "Courier New", monospace';
  wrapText(ctx, deathMsg, BASE_W / 2, 210, 260, 18);

  // RIP bobo
  ctx.font = '40px serif';
  ctx.fillText('🦞💀', BASE_W / 2, 270);

  // score
  ctx.fillStyle = '#2d3436';
  ctx.font = 'bold 28px "Courier New", monospace';
  ctx.fillText('SCORE: ' + score, BASE_W / 2, 320);

  // high score
  if (score >= highScore) {
    ctx.fillStyle = '#e17055';
    ctx.font = 'bold 14px "Courier New", monospace';
    ctx.fillText('🎉 NEW HIGH SCORE! 🎉', BASE_W / 2, 348);
  } else {
    ctx.fillStyle = '#636e72';
    ctx.font = '13px "Courier New", monospace';
    ctx.fillText('BEST: ' + highScore, BASE_W / 2, 348);
  }

  // share button
  ctx.fillStyle = '#1DA1F2';
  roundRect(ctx, BASE_W / 2 - 100, 375, 200, 40, 8);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 15px "Courier New", monospace';
  ctx.fillText('Share on 𝕏', BASE_W / 2, 400);

  // restart
  if (Math.sin(gameTime * 4) > -0.3) {
    ctx.fillStyle = '#636e72';
    ctx.font = '14px "Courier New", monospace';
    ctx.fillText('[ TAP / SPACE TO RETRY ]', BASE_W / 2, 460);
  }

  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function wrapText(ctx, text, x, y, maxW, lineH) {
  const words = text.split(' ');
  let line = '';
  for (const w of words) {
    const test = line + w + ' ';
    if (ctx.measureText(test).width > maxW && line !== '') {
      ctx.fillText(line, x, y);
      line = w + ' ';
      y += lineH;
    } else {
      line = test;
    }
  }
  ctx.fillText(line, x, y);
}

// share click handler
C.addEventListener('click', e => {
  if (state !== STATE.DEAD) return;
  const rect = C.getBoundingClientRect();
  const x = (e.clientX - rect.left) / scale;
  const y = (e.clientY - rect.top) / scale;
  // share button bounds
  if (x > BASE_W / 2 - 100 && x < BASE_W / 2 + 100 && y > 375 && y < 415) {
    const url = 'https://mrrrrabbit.github.io/bobo-games/dont-boil-bobo/';
    const text = `I scored ${score} in Don't Boil Bobo! 🦞🔥 Can you beat me? ${url} #DontBoilBobo #BoboGames`;
    window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent(text), '_blank');
  }
});

// share via touch on death screen
C.addEventListener('touchstart', function shareTouch(e) {
  if (state !== STATE.DEAD) return;
  const t = e.touches[0];
  const rect = C.getBoundingClientRect();
  const x = (t.clientX - rect.left) / scale;
  const y = (t.clientY - rect.top) / scale;
  if (x > BASE_W / 2 - 100 && x < BASE_W / 2 + 100 && y > 375 && y < 415) {
    e.stopImmediatePropagation();
    const url = 'https://mrrrrabbit.github.io/bobo-games/dont-boil-bobo/';
    const text = `I scored ${score} in Don't Boil Bobo! 🦞🔥 Can you beat me? ${url} #DontBoilBobo #BoboGames`;
    window.open('https://twitter.com/intent/tweet?text=' + encodeURIComponent(text), '_blank');
  }
}, { passive: false });

// ----- collision -----
function collides(a, b) {
  const pad = 6;
  return Math.abs(a.x - b.x) < (a.w / 2 + b.w / 2 - pad) &&
         Math.abs((a.y - a.h / 2) - b.y) < (a.h / 2 + b.h / 2 - pad);
}

// ----- main loop -----
let lastTime = 0;
function gameLoop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  gameTime += dt;

  ctx.clearRect(0, 0, BASE_W, BASE_H);

  if (state === STATE.TITLE) {
    drawTitle();
    requestAnimationFrame(gameLoop);
    return;
  }

  // ----- UPDATE -----
  if (state === STATE.PLAY) {
    // difficulty ramps
    difficulty = 1 + gameTime * 0.03;

    // score ticks
    score += Math.round(dt * 10 * difficulty);
    if (score % 50 < 2) sfxScore();

    // input
    const moveSpeed = (bobo.speed > 0 ? 280 : 200);
    let moving = false;
    if (keys['ArrowLeft'] || keys['a'] || keys['A'] || inputLeft) { bobo.vx = -moveSpeed; moving = true; }
    else if (keys['ArrowRight'] || keys['d'] || keys['D'] || inputRight) { bobo.vx = moveSpeed; moving = true; }
    if (!moving) bobo.vx *= 0.8;

    bobo.x += bobo.vx * dt;
    bobo.x = Math.max(20, Math.min(BASE_W - 20, bobo.x));

    // timers
    if (bobo.shield > 0) bobo.shield -= dt;
    if (bobo.speed > 0) bobo.speed -= dt;

    // spawning
    spawnTimer -= dt;
    if (spawnTimer <= 0) {
      spawnTimer = Math.max(0.25, 0.8 - difficulty * 0.03);
      spawnItem();
    }

    // proximity panic
    bobo.panic = false;
    for (const it of items) {
      if (isDanger(it.type) && Math.abs(it.x - bobo.x) < 40 && it.y > bobo.y - 120 && it.y < bobo.y) {
        bobo.panic = true;
        break;
      }
    }

    // items update + collision
    for (let i = items.length - 1; i >= 0; i--) {
      const it = items[i];
      it.y += it.vy * 60 * dt;
      it.wobble += dt * 3;
      it.x += Math.sin(it.wobble) * 0.3;
      it.rot += dt;

      if (it.y > BASE_H + 40) { items.splice(i, 1); continue; }

      if (collides(bobo, it)) {
        if (isDanger(it.type)) {
          if (bobo.shield > 0) {
            bobo.shield = 0;
            sfxShield();
            emitParticles(it.x, it.y, COL.shield, 12, 3);
            items.splice(i, 1);
          } else {
            // DEATH
            sfxHit();
            shakeT = 0.4;
            emitParticles(bobo.x, bobo.y - 20, 'rgba(200,200,200,0.6)', 30, 4);
            emitParticles(bobo.x, bobo.y - 20, COL.water, 20, 3);
            deathMsg = DEATH_MSGS[Math.floor(Math.random() * DEATH_MSGS.length)];
            if (score > highScore) { highScore = score; localStorage.setItem('bobo_hi', highScore); }
            state = STATE.DEAD;
          }
        } else {
          // power-up
          sfxCollect();
          if (it.type === ITEM_ICE) { bobo.shield = 5; emitParticles(it.x, it.y, COL.iceBright, 8, 2); }
          else if (it.type === ITEM_COFFEE) { bobo.speed = 4; emitParticles(it.x, it.y, COL.coffee, 8, 2); }
          else if (it.type === ITEM_STAR) { score += 50; emitParticles(it.x, it.y, COL.starBright, 12, 3); }
          items.splice(i, 1);
        }
      }
    }

    // particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * 60 * dt;
      p.y += p.vy * 60 * dt;
      p.vy += 2 * dt;
      p.life -= dt;
      if (p.life <= 0) particles.splice(i, 1);
    }

    if (shakeT > 0) shakeT -= dt;
  }

  // ----- DRAW -----
  ctx.save();
  if (shakeT > 0) {
    const s = shakeT * 12;
    ctx.translate(Math.random() * s - s / 2, Math.random() * s - s / 2);
  }

  drawBackground();

  // items
  for (const it of items) drawItem(it);

  // particles
  for (const p of particles) {
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // bobo
  if (state === STATE.PLAY) {
    drawBobo(bobo.x, bobo.y, gameTime, bobo.panic, bobo.shield > 0);
  }

  ctx.restore();

  drawHUD();

  if (state === STATE.DEAD) drawDeath();

  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>
