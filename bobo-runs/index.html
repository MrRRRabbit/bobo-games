<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bobo Runs! 🦞</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
  font-family: 'Courier New', monospace;
  touch-action: none;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}
canvas {
  display: block;
  image-rendering: pixelated;
  max-width: 100vw;
  max-height: 100vh;
}
.footer {
  color: #4a4a6a;
  font-size: 12px;
  margin-top: 8px;
  text-align: center;
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div class="footer">Made with 🦞 by @clawgirlbobo</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const BASE_W = 420;
const BASE_H = 700;
canvas.width = BASE_W;
canvas.height = BASE_H;

// Scale canvas for mobile
function resizeCanvas() {
  const scale = Math.min(window.innerWidth / BASE_W, window.innerHeight / BASE_H, 1);
  canvas.style.width = (BASE_W * scale) + 'px';
  canvas.style.height = (BASE_H * scale) + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// Constants
const GROUND_Y = BASE_H - 80;
const GRAVITY = 0.6;
const JUMP_FORCE = -12;
const BASE_SPEED = 4;
const SPEED_INCREMENT = 0.5;
const SPEED_INTERVAL = 500;

// Game state
let state = 'START'; // START, GAME, DEATH
let score = 0;
let highScore = parseInt(localStorage.getItem('boboRunsHigh') || '0');
let speed = BASE_SPEED;
let shakeTimer = 0;
let flashTimer = 0;
let lastObstacleX = BASE_W + 200;

// Bobo
const bobo = {
  x: 80,
  y: GROUND_Y,
  w: 40,
  h: 36,
  vy: 0,
  grounded: true,
  runFrame: 0,
  runTimer: 0
};

// Obstacles
let obstacles = [];
const OBSTACLE_TYPES = [
  { name: 'crab', w: 32, h: 28, groundLevel: true },
  { name: 'hook', w: 20, h: 50, groundLevel: false },
  { name: 'net', w: 50, h: 40, groundLevel: true },
  { name: 'chef', w: 36, h: 48, groundLevel: true, rare: true, speedMult: 1.5 }
];

// Bubbles
let bubbles = [];
for (let i = 0; i < 15; i++) {
  bubbles.push({
    x: Math.random() * BASE_W,
    y: Math.random() * GROUND_Y,
    r: 2 + Math.random() * 4,
    speed: 0.3 + Math.random() * 0.7,
    wobble: Math.random() * Math.PI * 2
  });
}

// Death messages
const DEATH_MESSAGES = [
  "The crab got you. Embarrassing.",
  "A fishing hook?! Really, Bobo??",
  "Caught by a sushi chef. Nooooo 🍣",
  "The net got you. Should have zigged.",
  "Crabs win today. Skill issue.",
  "Bobo.exe has stopped running"
];
let deathMessage = '';
let lastObstacleType = '';

// Sand particles for ground detail
const sandParticles = [];
for (let i = 0; i < 30; i++) {
  sandParticles.push({
    x: Math.random() * BASE_W,
    y: GROUND_Y + 10 + Math.random() * 60,
    r: 1 + Math.random() * 2,
    color: Math.random() > 0.5 ? '#d4a574' : '#c4955a'
  });
}

// ---- DRAWING FUNCTIONS ----

function drawBackground() {
  // Ocean gradient
  const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  grad.addColorStop(0, '#0f0f23');
  grad.addColorStop(0.5, '#16213e');
  grad.addColorStop(1, '#1a1a2e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, BASE_W, GROUND_Y);

  // Ocean floor
  const floorGrad = ctx.createLinearGradient(0, GROUND_Y, 0, BASE_H);
  floorGrad.addColorStop(0, '#c4955a');
  floorGrad.addColorStop(0.3, '#b8854a');
  floorGrad.addColorStop(1, '#8b6533');
  ctx.fillStyle = floorGrad;
  ctx.fillRect(0, GROUND_Y, BASE_W, BASE_H - GROUND_Y);

  // Sand line
  ctx.strokeStyle = '#d4a574';
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let x = 0; x < BASE_W; x += 8) {
    ctx.lineTo(x, GROUND_Y + Math.sin(x * 0.05 + Date.now() * 0.001) * 2);
  }
  ctx.stroke();

  // Sand particles
  for (const p of sandParticles) {
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawBubbles() {
  for (const b of bubbles) {
    b.y -= b.speed;
    b.wobble += 0.02;
    const wx = b.x + Math.sin(b.wobble) * 1.5;
    if (b.y < -10) {
      b.y = GROUND_Y + 10;
      b.x = Math.random() * BASE_W;
    }
    ctx.strokeStyle = 'rgba(100, 180, 255, 0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(wx, b.y, b.r, 0, Math.PI * 2);
    ctx.stroke();
    // Highlight
    ctx.fillStyle = 'rgba(150, 210, 255, 0.15)';
    ctx.beginPath();
    ctx.arc(wx - b.r * 0.3, b.y - b.r * 0.3, b.r * 0.4, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawBobo(x, y, frame) {
  const cx = x;
  const cy = y;

  ctx.save();
  ctx.translate(cx, cy);

  // Body (oval, red)
  ctx.fillStyle = '#e63946';
  ctx.beginPath();
  ctx.ellipse(0, -10, 16, 12, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body shine
  ctx.fillStyle = '#ff6b6b';
  ctx.beginPath();
  ctx.ellipse(-4, -14, 6, 4, -0.3, 0, Math.PI * 2);
  ctx.fill();

  // Tail segments
  ctx.fillStyle = '#d62839';
  const tailWag = Math.sin(Date.now() * 0.01) * 3;
  ctx.beginPath();
  ctx.ellipse(-18, -8 + tailWag, 8, 5, -0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#c1121f';
  ctx.beginPath();
  ctx.ellipse(-25, -6 + tailWag * 1.3, 6, 4, -0.1, 0, Math.PI * 2);
  ctx.fill();
  // Tail fan
  ctx.fillStyle = '#e63946';
  ctx.beginPath();
  ctx.ellipse(-31, -4 + tailWag * 1.5, 7, 6, 0.3, 0, Math.PI * 2);
  ctx.fill();

  // Legs (animated)
  ctx.strokeStyle = '#d62839';
  ctx.lineWidth = 2;
  const legOffset = frame ? 3 : -3;
  for (let i = 0; i < 3; i++) {
    const lx = -6 + i * 8;
    ctx.beginPath();
    ctx.moveTo(lx, -2);
    ctx.lineTo(lx + (i % 2 === 0 ? legOffset : -legOffset), 6);
    ctx.stroke();
  }

  // Claws
  const clawBob = Math.sin(Date.now() * 0.008) * 2;
  // Right claw (front)
  ctx.fillStyle = '#e63946';
  ctx.beginPath();
  ctx.ellipse(14, -16 + clawBob, 5, 4, 0.3, 0, Math.PI * 2);
  ctx.fill();
  // Claw pincer
  ctx.strokeStyle = '#e63946';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.arc(19, -18 + clawBob, 4, -0.5, 1.2);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(19, -14 + clawBob, 4, -1.2, 0.5);
  ctx.stroke();

  // Left claw (back, smaller)
  ctx.fillStyle = '#d62839';
  ctx.beginPath();
  ctx.ellipse(10, -20 + clawBob * 0.8, 4, 3, -0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#d62839';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(14, -22 + clawBob * 0.8, 3, -0.5, 1.0);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(14, -19 + clawBob * 0.8, 3, -1.0, 0.5);
  ctx.stroke();

  // Eyes
  // Stalks
  ctx.strokeStyle = '#e63946';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(6, -18);
  ctx.lineTo(8, -25);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(12, -18);
  ctx.lineTo(14, -25);
  ctx.stroke();

  // Eye whites
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(8, -27, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(14, -27, 4, 0, Math.PI * 2);
  ctx.fill();

  // Pupils
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath();
  ctx.arc(9, -27, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(15, -27, 2, 0, Math.PI * 2);
  ctx.fill();

  // Cute mouth
  ctx.strokeStyle = '#c1121f';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(11, -8, 3, 0.2, Math.PI - 0.2);
  ctx.stroke();

  // Antennae
  ctx.strokeStyle = '#e63946';
  ctx.lineWidth = 1.5;
  const antWag = Math.sin(Date.now() * 0.006) * 4;
  ctx.beginPath();
  ctx.moveTo(5, -20);
  ctx.quadraticCurveTo(0 + antWag, -35, -5 + antWag, -38);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(16, -20);
  ctx.quadraticCurveTo(22 + antWag, -35, 26 + antWag, -38);
  ctx.stroke();

  ctx.restore();
}

function drawCrab(x, y) {
  ctx.save();
  ctx.translate(x, y);

  // Body
  ctx.fillStyle = '#ff8c42';
  ctx.beginPath();
  ctx.ellipse(0, -8, 14, 10, 0, 0, Math.PI * 2);
  ctx.fill();

  // Shell pattern
  ctx.fillStyle = '#e07030';
  ctx.beginPath();
  ctx.ellipse(0, -10, 8, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Claws
  ctx.fillStyle = '#ff8c42';
  const clawAnim = Math.sin(Date.now() * 0.01) * 3;
  // Left claw
  ctx.beginPath();
  ctx.ellipse(-16, -12 + clawAnim, 6, 5, -0.3, 0, Math.PI * 2);
  ctx.fill();
  // Right claw
  ctx.beginPath();
  ctx.ellipse(16, -12 - clawAnim, 6, 5, 0.3, 0, Math.PI * 2);
  ctx.fill();

  // Legs
  ctx.strokeStyle = '#e07030';
  ctx.lineWidth = 2;
  for (let i = 0; i < 3; i++) {
    const legAnim = (i % 2 === 0 ? 1 : -1) * Math.sin(Date.now() * 0.008) * 2;
    ctx.beginPath();
    ctx.moveTo(-10 + i * 2, 0);
    ctx.lineTo(-14 + i * 2, 6 + legAnim);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(10 - i * 2, 0);
    ctx.lineTo(14 - i * 2, 6 + legAnim);
    ctx.stroke();
  }

  // Eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(-5, -16, 3.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(5, -16, 3.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath();
  ctx.arc(-4, -16, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(6, -16, 2, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawHook(x, y) {
  ctx.save();
  ctx.translate(x, y);

  // Line going up
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([4, 3]);
  ctx.beginPath();
  ctx.moveTo(0, -50);
  ctx.lineTo(0, 0);
  ctx.stroke();
  ctx.setLineDash([]);

  // Hook
  ctx.strokeStyle = '#c0c0c0';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.quadraticCurveTo(12, 15, 0, 25);
  ctx.quadraticCurveTo(-5, 20, -2, 15);
  ctx.stroke();

  // Hook point
  ctx.fillStyle = '#c0c0c0';
  ctx.beginPath();
  ctx.moveTo(-2, 15);
  ctx.lineTo(-5, 12);
  ctx.lineTo(0, 14);
  ctx.fill();

  // Bait (worm)
  ctx.strokeStyle = '#e8845c';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(0, 25);
  const wormWag = Math.sin(Date.now() * 0.008) * 3;
  ctx.quadraticCurveTo(5 + wormWag, 30, 2 + wormWag, 35);
  ctx.stroke();

  ctx.restore();
}

function drawNet(x, y) {
  ctx.save();
  ctx.translate(x, y);

  const wave = Math.sin(Date.now() * 0.005) * 2;

  // Net mesh
  ctx.strokeStyle = 'rgba(180, 180, 140, 0.7)';
  ctx.lineWidth = 1.5;

  // Vertical lines
  for (let i = -20; i <= 20; i += 10) {
    ctx.beginPath();
    ctx.moveTo(i, -35);
    ctx.quadraticCurveTo(i + wave, -15, i, 5);
    ctx.stroke();
  }

  // Horizontal lines
  for (let j = -30; j <= 0; j += 10) {
    ctx.beginPath();
    ctx.moveTo(-22, j + wave);
    ctx.lineTo(22, j - wave);
    ctx.stroke();
  }

  // Top bar
  ctx.strokeStyle = '#8b7355';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(-22, -35);
  ctx.lineTo(22, -35);
  ctx.stroke();

  // Rope going up
  ctx.strokeStyle = '#8b7355';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, -35);
  ctx.lineTo(0 + wave, -55);
  ctx.stroke();

  ctx.restore();
}

function drawChef(x, y) {
  ctx.save();
  ctx.translate(x, y);

  const bob = Math.sin(Date.now() * 0.006) * 1.5;

  // Body (white coat)
  ctx.fillStyle = '#f0ebe3';
  ctx.fillRect(-12, -20 + bob, 24, 28);

  // Legs
  ctx.fillStyle = '#333';
  ctx.fillRect(-10, 8 + bob, 8, 10);
  ctx.fillRect(2, 8 + bob, 8, 10);

  // Head
  ctx.fillStyle = '#f5c6a0';
  ctx.beginPath();
  ctx.arc(0, -26 + bob, 10, 0, Math.PI * 2);
  ctx.fill();

  // Chef hat
  ctx.fillStyle = '#fff';
  ctx.fillRect(-9, -42 + bob, 18, 10);
  ctx.beginPath();
  ctx.ellipse(0, -42 + bob, 12, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Hat top puff
  ctx.beginPath();
  ctx.ellipse(0, -48 + bob, 10, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  // Eyes (determined)
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(-6, -28 + bob, 3, 3);
  ctx.fillRect(3, -28 + bob, 3, 3);

  // Determined mouth
  ctx.strokeStyle = '#c1121f';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-4, -21 + bob);
  ctx.lineTo(4, -21 + bob);
  ctx.stroke();

  // Knife
  ctx.fillStyle = '#c0c0c0';
  ctx.save();
  const knifeSwing = Math.sin(Date.now() * 0.01) * 0.3;
  ctx.translate(14, -14 + bob);
  ctx.rotate(knifeSwing - 0.5);
  ctx.fillRect(0, -2, 16, 3);
  // Handle
  ctx.fillStyle = '#6b4226';
  ctx.fillRect(-4, -3, 6, 5);
  ctx.restore();

  ctx.restore();
}

function drawObstacle(obs) {
  const drawY = obs.groundLevel ? GROUND_Y : obs.y;
  switch (obs.name) {
    case 'crab': drawCrab(obs.x, drawY); break;
    case 'hook': drawHook(obs.x, obs.y); break;
    case 'net': drawNet(obs.x, drawY); break;
    case 'chef': drawChef(obs.x, drawY); break;
  }
}

// ---- GAME LOGIC ----

function jump() {
  if (state === 'START') {
    startGame();
    return;
  }
  if (state === 'DEATH') {
    if (deathClickReady) startGame();
    return;
  }
  if (bobo.grounded) {
    bobo.vy = JUMP_FORCE;
    bobo.grounded = false;
  }
}

let deathClickReady = false;

function startGame() {
  state = 'GAME';
  score = 0;
  speed = BASE_SPEED;
  obstacles = [];
  lastObstacleX = BASE_W + 200;
  bobo.y = GROUND_Y;
  bobo.vy = 0;
  bobo.grounded = true;
  shakeTimer = 0;
  flashTimer = 0;
  deathClickReady = false;
}

function die(obstacleType) {
  state = 'DEATH';
  lastObstacleType = obstacleType;
  shakeTimer = 15;
  flashTimer = 8;
  deathClickReady = false;
  setTimeout(() => { deathClickReady = true; }, 600);

  // Pick death message, try to match obstacle type
  if (obstacleType === 'crab') {
    deathMessage = Math.random() > 0.5 ? DEATH_MESSAGES[0] : DEATH_MESSAGES[4];
  } else if (obstacleType === 'hook') {
    deathMessage = DEATH_MESSAGES[1];
  } else if (obstacleType === 'chef') {
    deathMessage = DEATH_MESSAGES[2];
  } else if (obstacleType === 'net') {
    deathMessage = DEATH_MESSAGES[3];
  } else {
    deathMessage = DEATH_MESSAGES[5];
  }

  if (score > highScore) {
    highScore = score;
    localStorage.setItem('boboRunsHigh', highScore.toString());
  }
}

function spawnObstacle() {
  // Min gap based on speed
  const minGap = Math.max(180, 280 - speed * 8);
  if (lastObstacleX > BASE_W - minGap) return;

  // Random gap
  const gap = minGap + Math.random() * 120;
  const spawnX = BASE_W + gap * 0.3;

  // Pick type
  let type;
  const roll = Math.random();
  if (roll < 0.05 && speed > 5) {
    type = OBSTACLE_TYPES[3]; // chef (rare)
  } else if (roll < 0.25) {
    type = OBSTACLE_TYPES[1]; // hook
  } else if (roll < 0.45) {
    type = OBSTACLE_TYPES[2]; // net
  } else {
    type = OBSTACLE_TYPES[0]; // crab
  }

  const obs = {
    x: spawnX,
    name: type.name,
    w: type.w,
    h: type.h,
    groundLevel: type.groundLevel,
    y: type.groundLevel ? GROUND_Y : GROUND_Y - 30 - Math.random() * 40,
    speedMult: type.speedMult || 1
  };

  // Hitbox (slightly forgiving)
  obs.hitX = -type.w * 0.35;
  obs.hitY = type.groundLevel ? -type.h * 0.8 : (obs.y - GROUND_Y) - type.h * 0.5;
  obs.hitW = type.w * 0.7;
  obs.hitH = type.h * 0.7;

  obstacles.push(obs);
  lastObstacleX = spawnX;
}

function checkCollision(obs) {
  // Bobo hitbox (forgiving)
  const bx = bobo.x - 10;
  const by = bobo.y - bobo.h + 5;
  const bw = 20;
  const bh = bobo.h - 8;

  const ox = obs.x + obs.hitX;
  const oy = (obs.groundLevel ? GROUND_Y : obs.y) + obs.hitY;
  const ow = obs.hitW;
  const oh = obs.hitH;

  return bx < ox + ow && bx + bw > ox && by < oy + oh && by + bh > oy;
}

// ---- SCREENS ----

function drawStartScreen() {
  drawBackground();
  drawBubbles();

  // Draw Bobo standing
  drawBobo(BASE_W / 2, GROUND_Y, 0);

  // Title
  ctx.fillStyle = '#e63946';
  ctx.font = 'bold 42px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('BOBO RUNS!', BASE_W / 2, 180);

  ctx.font = '36px serif';
  ctx.fillText('🦞', BASE_W / 2, 230);

  // Instructions
  ctx.fillStyle = '#a0a0c0';
  ctx.font = '16px Courier New';
  ctx.fillText('SPACE or TAP to jump', BASE_W / 2, 300);
  ctx.fillText('Avoid crabs, hooks, nets', BASE_W / 2, 325);
  ctx.fillText('& sushi chefs!', BASE_W / 2, 350);

  // Blink prompt
  if (Math.floor(Date.now() / 600) % 2 === 0) {
    ctx.fillStyle = '#ff6b6b';
    ctx.font = 'bold 20px Courier New';
    ctx.fillText('TAP TO START', BASE_W / 2, 430);
  }

  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#ffd700';
    ctx.font = '14px Courier New';
    ctx.fillText('Best: ' + highScore, BASE_W / 2, 480);
  }
}

function drawDeathScreen() {
  // Dim overlay
  ctx.fillStyle = 'rgba(10, 10, 20, 0.75)';
  ctx.fillRect(0, 0, BASE_W, BASE_H);

  // Skull emoji
  ctx.font = '48px serif';
  ctx.textAlign = 'center';
  ctx.fillText('💀', BASE_W / 2, 180);

  // Death message
  ctx.fillStyle = '#ff6b6b';
  ctx.font = 'bold 18px Courier New';
  ctx.textAlign = 'center';

  // Word wrap death message
  const words = deathMessage.split(' ');
  let line = '';
  let lineY = 230;
  for (const word of words) {
    const test = line + word + ' ';
    if (ctx.measureText(test).width > BASE_W - 60) {
      ctx.fillText(line.trim(), BASE_W / 2, lineY);
      line = word + ' ';
      lineY += 24;
    } else {
      line = test;
    }
  }
  ctx.fillText(line.trim(), BASE_W / 2, lineY);

  // Score
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 32px Courier New';
  ctx.fillText(score + ' steps', BASE_W / 2, 310);

  if (score >= highScore && score > 0) {
    ctx.fillStyle = '#ffd700';
    ctx.font = '16px Courier New';
    ctx.fillText('★ NEW BEST! ★', BASE_W / 2, 345);
  } else {
    ctx.fillStyle = '#888';
    ctx.font = '14px Courier New';
    ctx.fillText('Best: ' + highScore, BASE_W / 2, 345);
  }

  // Share button
  drawButton('Share on X', BASE_W / 2, 410, '#1da1f2', shareScore);
  drawButton('Play Again', BASE_W / 2, 470, '#e63946', null);

  if (deathClickReady) {
    ctx.fillStyle = '#666';
    ctx.font = '12px Courier New';
    ctx.fillText('tap anywhere to retry', BASE_W / 2, 520);
  }
}

const buttons = [];

function drawButton(text, x, y, color, action) {
  const w = 200;
  const h = 40;
  const bx = x - w / 2;
  const by = y - h / 2;

  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.roundRect(bx, by, w, h, 8);
  ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 16px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText(text, x, y + 6);

  if (action) {
    buttons.push({ x: bx, y: by, w, h, action });
  }
}

function shareScore() {
  const text = `I ran ${score} steps as Bobo the lobster 🦞 before getting caught! Can you beat me? https://mrrrrabbit.github.io/bobo-games/bobo-runs/ #BoboRuns #clawgirlbobo`;
  const url = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(text);
  window.open(url, '_blank');
}

// ---- HUD ----

function drawHUD() {
  // Score
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 20px Courier New';
  ctx.textAlign = 'right';
  ctx.fillText(score, BASE_W - 15, 35);

  // Knots
  const knots = (speed * 2).toFixed(1);
  ctx.fillStyle = '#a0d0ff';
  ctx.font = '13px Courier New';
  ctx.fillText('Knots: ' + knots, BASE_W - 15, 55);

  // High score
  ctx.fillStyle = '#ffd700';
  ctx.font = '12px Courier New';
  ctx.textAlign = 'left';
  ctx.fillText('Best: ' + highScore, 15, 35);
}

// ---- MAIN LOOP ----

let lastTime = 0;
let scoreAccum = 0;

function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 16.67, 3); // cap delta
  lastTime = timestamp;
  buttons.length = 0;

  // Screen shake
  ctx.save();
  if (shakeTimer > 0) {
    const sx = (Math.random() - 0.5) * shakeTimer;
    const sy = (Math.random() - 0.5) * shakeTimer;
    ctx.translate(sx, sy);
    shakeTimer -= dt;
  }

  // Flash
  if (flashTimer > 0) {
    ctx.fillStyle = 'rgba(255, 100, 100, ' + (flashTimer / 8) * 0.4 + ')';
    ctx.fillRect(0, 0, BASE_W, BASE_H);
    flashTimer -= dt;
  }

  if (state === 'START') {
    drawStartScreen();
  } else if (state === 'GAME') {
    updateGame(dt);
    drawGame();
  } else if (state === 'DEATH') {
    drawGame(); // frozen scene behind
    drawDeathScreen();
  }

  ctx.restore();
  requestAnimationFrame(gameLoop);
}

function updateGame(dt) {
  // Score
  scoreAccum += speed * dt * 0.1;
  if (scoreAccum >= 1) {
    const add = Math.floor(scoreAccum);
    score += add;
    scoreAccum -= add;
  }

  // Speed increase
  speed = BASE_SPEED + Math.floor(score / SPEED_INTERVAL) * SPEED_INCREMENT;

  // Bobo physics
  if (!bobo.grounded) {
    bobo.vy += GRAVITY * dt;
    bobo.y += bobo.vy * dt;
    if (bobo.y >= GROUND_Y) {
      bobo.y = GROUND_Y;
      bobo.vy = 0;
      bobo.grounded = true;
    }
  }

  // Run animation
  bobo.runTimer += dt;
  if (bobo.runTimer > 6) {
    bobo.runTimer = 0;
    bobo.runFrame = 1 - bobo.runFrame;
  }

  // Move obstacles
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const obs = obstacles[i];
    obs.x -= speed * obs.speedMult * dt;

    if (obs.x < -60) {
      obstacles.splice(i, 1);
      continue;
    }

    if (checkCollision(obs)) {
      die(obs.name);
      return;
    }
  }

  // Track rightmost obstacle for spawn gap
  lastObstacleX = -Infinity;
  for (const obs of obstacles) {
    if (obs.x > lastObstacleX) lastObstacleX = obs.x;
  }
  if (obstacles.length === 0) lastObstacleX = 0;

  spawnObstacle();
}

function drawGame() {
  drawBackground();
  drawBubbles();

  // Draw obstacles
  for (const obs of obstacles) {
    drawObstacle(obs);
  }

  // Draw Bobo
  drawBobo(bobo.x, bobo.y, bobo.runFrame);

  drawHUD();
}

// ---- INPUT ----

function handleClick(clientX, clientY) {
  if (state === 'DEATH') {
    // Check share button
    const rect = canvas.getBoundingClientRect();
    const scaleX = BASE_W / rect.width;
    const scaleY = BASE_H / rect.height;
    const x = (clientX - rect.left) * scaleX;
    const y = (clientY - rect.top) * scaleY;

    for (const btn of buttons) {
      if (x >= btn.x && x <= btn.x + btn.w && y >= btn.y && y <= btn.y + btn.h) {
        btn.action();
        return;
      }
    }
  }
  jump();
}

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    jump();
  }
});

canvas.addEventListener('click', (e) => {
  handleClick(e.clientX, e.clientY);
});

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  handleClick(touch.clientX, touch.clientY);
}, { passive: false });

// Start
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
